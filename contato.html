<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato</title>
</head>
<body>
  <h1>Entre em contato</h1>
  <p>
    <a href="indice.html">Início</a> &
    <a href="sobre.html">Sobre</a>
  </p>
  <form>
    <p>
    <label>Nome completo:</label>
    <input type="text" name="nome" placeholder="Digite seu nome">
    </p>
    <p>
    <label>Seu e-mail:</label>
    <input type="email" name="email" placeholder="seu@email.com" >
    </p>
    <p>
    <label>Seu linkedin:</label>
    <input type="text" name="linkedin" placeholder="Digite seu linkedin">
    </p>
    <p>
      <label>Sua mensagem:</label><br>
  <textarea name="mensagem" rows="5" cols="40" placeholder="Escreva aqui sua mensagem..."></textarea>
    </p>
    <p>
      <button type="submit">Enviar mensagem</button>
    </p>
  </form>
  
</body>
</html>
